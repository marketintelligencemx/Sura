<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso — Estudio de Mercado | Aldebaran Consulting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #1A1A1A;
      --dark: #2D2D2D;
      --white: #FFFFFF;
      --cream: #F5F3EF;
      --gray: #666666;
      --gray-light: #999999;
      --gray-border: #E0DDDA;
      --red: #E63329;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 0 1.5rem;
    }

    .login-card {
      background: var(--white);
      border-radius: 12px;
      padding: 3rem 2.5rem 2.5rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
    }

    .logos {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--gray-border);
    }

    .logo-sura {
      height: 40px;
      width: auto;
    }

    .logo-divider {
      width: 1px;
      height: 36px;
      background: var(--gray-border);
    }

    .logo-aldebaran {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-aldebaran img {
      height: 34px;
      width: auto;
    }

    .logo-aldebaran span {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      color: var(--black);
      line-height: 1.2;
    }

    .logo-aldebaran span em {
      font-style: normal;
      color: var(--red);
    }

    .login-title {
      font-family: 'Anton', sans-serif;
      font-size: 1.4rem;
      color: var(--black);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 0.4rem;
      letter-spacing: 0.02em;
    }

    .login-subtitle {
      font-size: 0.85rem;
      color: var(--gray);
      text-align: center;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gray);
      margin-bottom: 0.4rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--black);
      background: var(--cream);
      border: 1.5px solid var(--gray-border);
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(230, 51, 41, 0.08);
    }

    .form-group input::placeholder {
      color: var(--gray-light);
      font-weight: 400;
    }

    .btn-login {
      width: 100%;
      padding: 0.85rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--white);
      background: var(--black);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }

    .btn-login:hover {
      background: var(--dark);
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    .error-msg {
      display: none;
      text-align: center;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--red);
      margin-top: 1rem;
      padding: 0.6rem;
      background: rgba(230, 51, 41, 0.06);
      border-radius: 6px;
    }

    .error-msg.visible {
      display: block;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .footer-text {
      text-align: center;
      font-size: 0.72rem;
      color: var(--gray-light);
      margin-top: 2rem;
      line-height: 1.6;
    }

    .footer-text strong {
      color: var(--gray);
    }

    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.5rem 1.5rem; }
      .logos { gap: 1.25rem; }
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-card">

    <!-- Logos -->
    <div class="logos">
      <!-- Sura logo -->
      <svg class="logo-sura" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="sura-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00A859"/>
            <stop offset="100%" stop-color="#007A3D"/>
          </linearGradient>
        </defs>
        <!-- Sura wordmark -->
        <text x="0" y="56" font-family="'Montserrat', sans-serif" font-weight="800" font-size="48" fill="url(#sura-grad)" letter-spacing="-1">SURA</text>
        <text x="165" y="56" font-family="'Montserrat', sans-serif" font-weight="400" font-size="14" fill="#007A3D" letter-spacing="0.5">SEGUROS</text>
      </svg>

      <div class="logo-divider"></div>

      <!-- Aldebaran logo -->
      <div class="logo-aldebaran">
        <img src="logo.svg" alt="Aldebaran">
        <span>Aldebaran<em>.</em><br><span style="font-weight:400;font-size:0.7rem;color:var(--gray)">Consulting</span></span>
      </div>
    </div>

    <!-- Title -->
    <div class="login-title">Estudio de Mercado</div>
    <div class="login-subtitle">Sector Asegurador M&eacute;xico &mdash; Q4 2025<br>Documento confidencial. Acceso restringido.</div>

    <!-- Form -->
    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Contrase&ntilde;a</label>
        <input type="password" id="password" name="password" placeholder="Ingresa tu contrase&ntilde;a" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login">Acceder al Estudio</button>
      <div class="error-msg" id="errorMsg">Usuario o contrase&ntilde;a incorrectos</div>
    </form>
  </div>

  <div class="footer-text">
    <strong>Aldebaran Consulting</strong> &mdash; Market Intelligence<br>
    Abril 2026 &bull; Versi&oacute;n 2.0
  </div>
</div>

<script>
function handleLogin(e) {
  e.preventDefault();
  var u = document.getElementById('username').value;
  var p = document.getElementById('password').value;
  var err = document.getElementById('errorMsg');

  // Simple hash check to avoid plain-text credentials in source
  var validU = 'U3VyYV8yMDI2';  // Base64 of Sura_2026
  var validP = 'c3VyYTIwMjY=';  // Base64 of sura2026

  if (btoa(u) === validU && btoa(p) === validP) {
    // Set session token
    sessionStorage.setItem('aldebaran_auth', 'true');
    sessionStorage.setItem('aldebaran_ts', Date.now().toString());
    window.location.href = 'estudio.html';
  } else {
    err.classList.remove('visible');
    void err.offsetWidth; // trigger reflow for animation
    err.classList.add('visible');
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
  return false;
}

// If already authenticated in this session, redirect
if (sessionStorage.getItem('aldebaran_auth') === 'true') {
  var ts = parseInt(sessionStorage.getItem('aldebaran_ts') || '0');
  // Session valid for 8 hours
  if (Date.now() - ts < 8 * 60 * 60 * 1000) {
    window.location.href = 'estudio.html';
  } else {
    sessionStorage.removeItem('aldebaran_auth');
    sessionStorage.removeItem('aldebaran_ts');
  }
}
</script>

</body>
</html>
